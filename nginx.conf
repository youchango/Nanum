server {
    listen 80;

    # 1. 프론트엔드 화면 서빙 (React/Vite)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. [추가] 백엔드 API 프록시 (핵심!!!)
    # /api 로 시작하는 모든 요청을 백엔드 서버로 넘겨줍니다.
    location /api/ {
        # ⚠️ 주의: 컨테이너 내부이므로 localhost 대신 도커 호스트 IP(172.17.0.1) 또는 서버의 실제 IP를 적어야 합니다.
        proxy_pass http://172.17.0.1:9021;

        # 헤더 정보도 같이 백엔드에 넘겨줍니다 (클라이언트 IP 추적 등을 위해)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. 실제 업로드된 파일이 위치한 경로 설정
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        autoindex off;
        access_log off;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}