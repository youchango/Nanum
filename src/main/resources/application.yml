spring:
  profiles:
    active: local # Default to local

jwt:
  # Base64 Encoded Secret Key (Must be at least 256 bits / 32 bytes)
  # Example: "VGhpcyBpcyBhIHNhbXBsZSBzZWNyZXQga2V5IGZvciBKV1QgZ2VuZXJhdGlvbiA="
  secret: "VGhpcyBzZWNyZXQga2V5IG11c3QgYmUgYXQgbGVhc3QgMzIgYnl0ZXMgbG9uZyBmb3Igc2VjdXJpdHkgcHVycG9zZXM=" 
  access-token-validity-in-seconds: 3600 # 1 hour
  refresh-token-validity-in-seconds: 86400 # 1 day


